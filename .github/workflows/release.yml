# Anchorworks — tagged release.
#
# Triggered on `v*` tag push. Builds signed native bundles for all three
# desktop OSes, assembles them into a GitHub Release, and publishes the
# `latest.json` manifest the in-app auto-updater polls for new versions.
#
# Required secrets (set in repo Settings → Secrets and variables → Actions):
#   - TAURI_SIGNING_PRIVATE_KEY  — generated by `tauri signer generate`.
#                                  If your key was generated WITH a password,
#                                  also add TAURI_SIGNING_PRIVATE_KEY_PASSWORD
#                                  here and wire it into the env block below.
# Optional (macOS notarisation; build still produces unsigned .app + .dmg
# without them):
#   - APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_SIGNING_IDENTITY
#   - APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID

name: release

on:
  push:
    tags: ['v*']

# GitHub changed default GITHUB_TOKEN scope to read-only for new repos
# in 2023. Release creation + asset upload need write access; declare it
# explicitly at the workflow root so every job inherits.
permissions:
  contents: write

jobs:
  # Single-job pattern: each matrix entry calls tauri-action with the
  # SAME tagName; tauri-action internally find-or-creates one release
  # per tag and appends its bundles to it. No cross-job state, no
  # release_id passing, no race conditions when one OS finishes faster
  # than the others. This is the canonical pattern from tauri-action's
  # README — the previous two-job (draft → bundle) layout broke with
  # "Not Found - list-release-assets" because the draft id passed across
  # jobs wasn't reliably accepted by tauri-action's upload step.
  bundle:
    name: Bundle ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: '--target universal-apple-darwin'
          - os: ubuntu-latest
            args: ''
          - os: windows-latest
            args: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - name: Install Linux WebKitGTK deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev libudev-dev
      # See build.yml for the rationale on npm install vs npm ci.
      - run: npm install --no-audit --no-fund --prefer-offline
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Build + sign + attach to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Password env var omitted — our updater key was generated
          # without a password. See build.yml for the rationale.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # Apple code-signing env vars deliberately ABSENT — passing an
          # empty `APPLE_CERTIFICATE=""` triggers `security import`
          # against the empty string, which dies with
          #   SecKeychainItemImport: One or more parameters … were not valid
          # If you obtain an Apple Developer cert later, paste these
          # six secrets in repo Settings and uncomment the env block:
          #   APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD
          #   APPLE_SIGNING_IDENTITY / APPLE_ID
          #   APPLE_PASSWORD / APPLE_TEAM_ID
          # Until then, the .dmg ships unsigned (Gatekeeper warns on
          # first launch; users right-click → Open to bypass).
        with:
          # tagName / releaseName let tauri-action own release lifecycle:
          # first matrix job to finish creates the draft, the others
          # find-and-append. No cross-job release_id handoff.
          tagName: ${{ github.ref_name }}
          releaseName: 'Anchorworks ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # TEMPORARILY DISABLED: the NuGet step ("Download latest WebView2 fixed
  # runtime") failed on v0.9.2/v0.9.3 with errors we can't see remotely
  # (need the live workflow log). Skipping the job lets the regular
  # bundles ship while we diagnose. Re-enable by removing the `if: false`
  # below — the actual job body is intact below.
  #
  # Portable Windows variant — ships a self-contained .zip with the raw
  # executable plus a fixed-version WebView2 runtime alongside it. The
  # binary's webviewInstallMode is overridden via --config so the loader
  # looks for WebView2 next to itself instead of in the system Edge
  # install, which means the zip Just Works on locked-down or offline
  # Windows machines that don't have WebView2 pre-installed.
  #
  # Trade-off: the zip is ~200 MB (WebView2 fixed runtime is most of it).
  # The regular NSIS installer remains the recommended download for
  # everyday users; this portable lives alongside it for the offline /
  # USB-stick / no-admin use cases.
  portable-windows:
    name: Portable Windows (.zip)
    needs: bundle
    if: false # Skip until the NuGet WebView2 download is debugged.
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm install --no-audit --no-fund --prefer-offline
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Microsoft publishes WebView2 fixed-version runtimes to NuGet under
      # versioned package ids of the form
      #   Microsoft.Web.WebView2.FixedVersionRuntime.<version>.x64
      # Only a SUBSET of Chromium milestones get a published fixed-runtime
      # package, so pinning a single version goes stale fast (134/131
      # disappeared when we tried). Instead, query the NuGet v3 search API
      # at build time and pick the highest-version x64 package available.
      # Cost: one tiny JSON request per release.
      - name: Download latest WebView2 fixed runtime from NuGet
        shell: pwsh
        run: |
          $queryUrl = 'https://azuresearch-usnc.nuget.org/query?q=Microsoft.Web.WebView2.FixedVersionRuntime&prerelease=false&take=200'
          $results = Invoke-RestMethod -Uri $queryUrl
          $x64Packages = $results.data | Where-Object { $_.id -like '*FixedVersionRuntime*.x64' }
          if (-not $x64Packages) {
            throw "No FixedVersionRuntime x64 packages returned by NuGet search"
          }
          # [Version] cast gives proper numeric comparison (131.0.2903.86
          # vs 1.0.123 sorts correctly), unlike string ordering.
          $latest = $x64Packages |
            Sort-Object -Property @{ Expression = { [Version]$_.version } } -Descending |
            Select-Object -First 1
          $pkgId = $latest.id
          $pkgVer = $latest.version
          Write-Host "Selected $pkgId @ $pkgVer"

          $url = "https://www.nuget.org/api/v2/package/$pkgId/$pkgVer"
          Invoke-WebRequest -Uri $url -OutFile webview2.nupkg
          Expand-Archive -Force -Path webview2.nupkg -DestinationPath webview2-temp

          # The NuGet package nests the runtime under build\native\<dir>.
          # Lift it up to src-tauri\ so the Tauri config below can reference
          # it via a clean relative path.
          $runtimeDir = Get-ChildItem -Path webview2-temp\build\native -Directory `
                       -Filter "Microsoft.WebView2.FixedVersionRuntime.*" |
                       Select-Object -First 1
          if (-not $runtimeDir) { throw "WebView2 runtime folder not found in NuGet package" }
          Move-Item $runtimeDir.FullName -Destination src-tauri\
          $relPath = "./$($runtimeDir.Name)/"
          echo "WEBVIEW2_RELPATH=$relPath" >> $env:GITHUB_ENV
          echo "WEBVIEW2_DIRNAME=$($runtimeDir.Name)" >> $env:GITHUB_ENV

      # Override webviewInstallMode at build time so the produced binary
      # carries the fixed-runtime relative path baked in.  --bundles app
      # asks Tauri to produce only the raw executable (no installer); we
      # zip it ourselves below alongside the WebView2 folder.
      - name: Build portable bundle
        shell: pwsh
        run: |
          $cfg = @{
            bundle = @{
              windows = @{
                webviewInstallMode = @{
                  type = 'fixedRuntime'
                  path = $env:WEBVIEW2_RELPATH
                }
              }
            }
          } | ConvertTo-Json -Depth 10 -Compress
          # ConvertTo-Json on a single-key object emits non-array JSON
          # already, but tauri's --config wants a path or a string; pass it
          # via stdin-style argument so PowerShell doesn't word-split.
          npx tauri build --target x86_64-pc-windows-msvc --bundles app --config "$cfg"
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Package portable .zip
        shell: pwsh
        run: |
          $ver = (Get-Content package.json | ConvertFrom-Json).version
          $dist = "Anchorworks_${ver}_x64-portable"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          Copy-Item "src-tauri\target\x86_64-pc-windows-msvc\release\anchorworks.exe" `
                    -Destination "$dist\Anchorworks.exe"
          Copy-Item -Recurse "src-tauri\$env:WEBVIEW2_DIRNAME" -Destination "$dist\"
          # Self-documenting README so users who unzip into a random folder
          # know what they're looking at without checking the GitHub page.
          @"
          Anchorworks $ver — Portable Edition
          ====================================

          Unzip anywhere and run Anchorworks.exe. No install, no admin
          rights, no internet required at first launch (a fixed-version
          WebView2 runtime is included alongside the exe).

          What's inside:
            Anchorworks.exe                          — the application
            $env:WEBVIEW2_DIRNAME\  — bundled Edge WebView2 runtime

          Keep the WebView2 folder next to the exe; the loader looks for
          it via a relative path. Moving the exe out of this directory
          will make it fall back to the system WebView2 install (which
          may not be present on locked-down boxes).
          "@ | Out-File -Encoding utf8 "$dist\README.txt"
          Compress-Archive -Path "$dist\*" -DestinationPath "$dist.zip"
          echo "PORTABLE_ZIP=$dist.zip" >> $env:GITHUB_ENV

      - name: Attach portable .zip to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.PORTABLE_ZIP }}
          # Don't flip published status here — the publish job below does
          # that after both bundle + portable-windows finish.
          draft: true

  publish:
    name: Publish release
    # portable-windows omitted while it's disabled (`if: false`); add it
    # back to needs once that job is re-enabled.
    needs: [bundle]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Flip the draft tauri-action created from draft → published once
      # every OS has attached its bundles. Looks up the release by tag
      # name rather than a passed-in id so this stays decoupled from the
      # bundle matrix.
      #
      # CRITICAL: must use `listReleases` (not `getReleaseByTag`) — the
      # latter endpoint only returns PUBLISHED releases and 404s on
      # drafts. Since tauri-action creates the release as a draft, we
      # paginate listReleases and filter by tag_name ourselves.
      - name: Mark release as published
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const tag = context.ref.replace('refs/tags/', '');
            const releases = await github.paginate(
              github.rest.repos.listReleases, { owner, repo, per_page: 100 }
            );
            const release = releases.find(r => r.tag_name === tag);
            if (!release) {
              core.setFailed(`No release found for tag ${tag}. ` +
                `tauri-action may have failed to create one.`);
              return;
            }
            await github.rest.repos.updateRelease({
              owner, repo, release_id: release.id, draft: false,
            });
            core.info(`Published release ${release.html_url}`);
