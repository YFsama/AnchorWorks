# Anchorworks — tagged release.
#
# Triggered on `v*` tag push. Builds signed native bundles for all three
# desktop OSes, assembles them into a GitHub Release, and publishes the
# `latest.json` manifest the in-app auto-updater polls for new versions.
#
# Required secrets (set in repo Settings → Secrets and variables → Actions):
#   - TAURI_SIGNING_PRIVATE_KEY  — generated by `tauri signer generate`.
#                                  If your key was generated WITH a password,
#                                  also add TAURI_SIGNING_PRIVATE_KEY_PASSWORD
#                                  here and wire it into the env block below.
# Optional (macOS notarisation; build still produces unsigned .app + .dmg
# without them):
#   - APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_SIGNING_IDENTITY
#   - APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID

name: release

on:
  push:
    tags: ['v*']

# GitHub changed default GITHUB_TOKEN scope to read-only for new repos
# in 2023. Release creation + asset upload need write access; declare it
# explicitly at the workflow root so every job inherits.
permissions:
  contents: write

jobs:
  # Single-job pattern: each matrix entry calls tauri-action with the
  # SAME tagName; tauri-action internally find-or-creates one release
  # per tag and appends its bundles to it. No cross-job state, no
  # release_id passing, no race conditions when one OS finishes faster
  # than the others. This is the canonical pattern from tauri-action's
  # README — the previous two-job (draft → bundle) layout broke with
  # "Not Found - list-release-assets" because the draft id passed across
  # jobs wasn't reliably accepted by tauri-action's upload step.
  bundle:
    name: Bundle ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: '--target universal-apple-darwin'
          - os: ubuntu-latest
            args: ''
          - os: windows-latest
            args: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - name: Install Linux WebKitGTK deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev libudev-dev
      # See build.yml for the rationale on npm install vs npm ci.
      - run: npm install --no-audit --no-fund --prefer-offline
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Build + sign + attach to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Password env var omitted — our updater key was generated
          # without a password. See build.yml for the rationale.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # Apple code-signing env vars deliberately ABSENT — passing an
          # empty `APPLE_CERTIFICATE=""` triggers `security import`
          # against the empty string, which dies with
          #   SecKeychainItemImport: One or more parameters … were not valid
          # If you obtain an Apple Developer cert later, paste these
          # six secrets in repo Settings and uncomment the env block:
          #   APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD
          #   APPLE_SIGNING_IDENTITY / APPLE_ID
          #   APPLE_PASSWORD / APPLE_TEAM_ID
          # Until then, the .dmg ships unsigned (Gatekeeper warns on
          # first launch; users right-click → Open to bypass).
        with:
          # tagName / releaseName let tauri-action own release lifecycle:
          # first matrix job to finish creates the draft, the others
          # find-and-append. No cross-job release_id handoff.
          tagName: ${{ github.ref_name }}
          releaseName: 'Anchorworks ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  publish:
    name: Publish release
    needs: bundle
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Flip the draft tauri-action created from draft → published once
      # every OS has attached its bundles. Looks up the release by tag
      # name rather than a passed-in id so this stays decoupled from the
      # bundle matrix.
      - name: Mark release as published
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const tag = context.ref.replace('refs/tags/', '');
            const { data: release } = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            await github.rest.repos.updateRelease({
              owner, repo, release_id: release.id, draft: false,
            });
            core.info(`Published release ${release.html_url}`);
