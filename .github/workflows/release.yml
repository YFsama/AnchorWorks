# Anchorworks — tagged release.
#
# Triggered on `v*` tag push. Builds signed native bundles for all three
# desktop OSes, assembles them into a GitHub Release, and publishes the
# `latest.json` manifest the in-app auto-updater polls for new versions.
#
# Required secrets (set in repo Settings → Secrets and variables → Actions):
#   - TAURI_SIGNING_PRIVATE_KEY           — generated by `tauri signer generate`
#   - TAURI_SIGNING_PRIVATE_KEY_PASSWORD  — passphrase for the above
#   - APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_SIGNING_IDENTITY /
#     APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID — for macOS notarisation
#     (optional; build still produces unsigned .app + .dmg without them)

name: release

on:
  push:
    tags: ['v*']

jobs:
  draft:
    name: Draft release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - uses: actions/checkout@v4
      - id: create_release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          name: Anchorworks ${{ github.ref_name }}
          generate_release_notes: true

  bundle:
    name: Bundle ${{ matrix.os }}
    needs: draft
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: '--target universal-apple-darwin'
          - os: ubuntu-latest
            args: ''
          - os: windows-latest
            args: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - name: Install Linux WebKitGTK deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev libudev-dev
      - run: npm ci
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Build + sign + attach to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.draft.outputs.release_id }}
          args: ${{ matrix.args }}

  publish:
    name: Publish release + updater manifest
    needs: bundle
    runs-on: ubuntu-latest
    steps:
      - name: Mark release as published
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const release_id = ${{ needs.draft.outputs.release_id }};
            await github.rest.repos.updateRelease({ owner, repo, release_id, draft: false });
