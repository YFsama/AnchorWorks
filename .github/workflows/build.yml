# Anchorworks — dual-target CI.
#
# Each push runs two parallel pipelines:
#   1. PWA — fast Node-only `npm run build:web` that exercises the
#      shipping web bundle (~1 min, runs on every commit).
#   2. Native — Tauri bundle matrix across macOS / Windows / Linux. Each
#      job runs `npm run build:native` so the same Vite build is wrapped
#      by `tauri build`; the bundle is signed with the keys stored in
#      repo secrets (TAURI_SIGNING_PRIVATE_KEY / *_PASSWORD).
#
# The native matrix is what produces the auto-updater payloads consumed
# by the endpoint configured in `src-tauri/tauri.conf.json#updater`. The
# `release.yml` workflow takes over from here on tag push: it downloads
# the per-OS artifacts, generates `latest.json`, and uploads everything
# to a GitHub Release.

name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pwa:
    name: PWA build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      # `npm install` (not `npm ci`) — works around a known npm bug
      # where the lockfile is missing transitive deps of the wasm32
      # rolldown binding (`@emnapi/core` / `@emnapi/runtime`). The
      # wasm32 binding itself is unused on every CI runner (each has
      # a native rolldown binding); `npm ci` strict-validates the
      # entire lockfile anyway and fails. `npm install` reads the
      # lockfile but doesn't strict-validate cross-platform optionals.
      - run: npm install --no-audit --no-fund --prefer-offline
      - run: npm run build:web
      - name: Upload PWA dist
        uses: actions/upload-artifact@v5
        with:
          name: dist-pwa
          path: dist
          retention-days: 14

  native:
    name: Native bundle (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      # Rust toolchain + GTK / WebKit deps required by tauri-build.
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux WebKitGTK deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev libudev-dev

      # `npm install` (not `npm ci`) — works around a known npm bug
      # where the lockfile is missing transitive deps of the wasm32
      # rolldown binding (`@emnapi/core` / `@emnapi/runtime`). The
      # wasm32 binding itself is unused on every CI runner (each has
      # a native rolldown binding); `npm ci` strict-validates the
      # entire lockfile anyway and fails. `npm install` reads the
      # lockfile but doesn't strict-validate cross-platform optionals.
      - run: npm install --no-audit --no-fund --prefer-offline

      # Cache Cargo registry + target dir keyed on Cargo.lock so subsequent
      # native builds skip the cold dependency compile (~12 min on Linux).
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build native bundle
        env:
          # Private key is required for updater signing. The password env
          # var is intentionally absent — our key was generated without
          # one (`tauri signer generate -p ""`), so leaving the variable
          # unset is correct. If you regenerate with a password later,
          # add `TAURI_SIGNING_PRIVATE_KEY_PASSWORD` here and create the
          # matching repo secret.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: npm run build:native

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v5
        with:
          name: tauri-bundle-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/**/*
          retention-days: 14
